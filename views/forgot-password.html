<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TutorMatch — Forgot Password</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/syracuse-background.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0d1a;
      padding: 24px;
    }
    .auth-card {
      background: #0f1428;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo img { width: 48px; height: 48px; border-radius: 12px; }
    .auth-logo h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-top: 10px;
      color: #fff;
    }
    .auth-logo h1 span { color: #F76900; }
    .auth-subtitle {
      text-align: center;
      color: #6b7499;
      font-size: 0.85rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      background: #161c35;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8eaf6;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #F76900;
    }
    .btn-primary {
      width: 100%;
      background: #F76900;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover    { background: #e05e00; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .feedback {
      text-align: center;
      margin-top: 14px;
      font-size: 0.85rem;
      min-height: 20px;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: #6b7499;
    }
    .back-link a { color: #F76900; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .success-state { display: none; text-align: center; }
    .success-icon { font-size: 3rem; margin-bottom: 16px; }
    .success-state h3 { color: #00d4aa; margin-bottom: 10px; }
    .success-state p  { color: #6b7499; font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo.png" alt="TutorMatch">
        <h1><span>Tutor</span>Match</h1>
      </div>

      <!-- Form state -->
      <div id="formState">
        <p class="auth-subtitle">Enter your .edu email and we'll send you a link to reset your password.</p>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="emailInput" placeholder="you@syr.edu" autocomplete="email">
        </div>
        <button class="btn-primary" id="submitBtn" onclick="sendReset()">Send Reset Link</button>
        <div class="feedback" id="feedback"></div>
      </div>

      <!-- Success state -->
      <div class="success-state" id="successState">
        <div class="success-icon">📬</div>
        <h3>Check your inbox!</h3>
        <p>We sent a password reset link to <strong id="sentTo"></strong>.<br><br>The link expires in <strong>1 hour</strong>. Check your spam folder if you don't see it.</p>
      </div>

      <div class="back-link">
        <a href="/">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    async function sendReset() {
      const email    = document.getElementById('emailInput').value.trim();
      const btn      = document.getElementById('submitBtn');
      const feedback = document.getElementById('feedback');

      if (!email) {
        feedback.style.color = '#e74c3c';
        feedback.textContent = '⚠️ Please enter your email.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      feedback.textContent = '';

      try {
        const res  = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('formState').style.display = 'none';
          document.getElementById('sentTo').textContent = email;
          document.getElementById('successState').style.display = 'block';
        } else {
          feedback.style.color = '#e74c3c';
          feedback.textContent = data.error || 'Something went wrong. Try again.';
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }
      } catch {
        feedback.style.color = '#e74c3c';
        feedback.textContent = 'Network error. Try again.';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }

    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendReset();
    });
  </script>
</body>
</html>
