<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TutorMatch — Page Not Found</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #000E54 0%, #001580 60%, #F76900 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    .notfound-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 30px 60px rgba(0,14,84,0.3),
        0 10px 24px rgba(247,105,0,0.15);
      border-top: 6px solid #F76900;
      animation: cardIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .notfound-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .notfound-logo img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid rgba(247,105,0,0.3);
    }

    .notfound-logo span {
      font-size: 1.2rem;
      font-weight: 800;
    }

    .notfound-code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #000E54, #F76900);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .notfound-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      display: block;
    }

    .notfound-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #000E54;
      margin-bottom: 10px;
    }

    .notfound-message {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .notfound-reason {
      display: inline-block;
      background: #f4f6fb;
      border-left: 3px solid #F76900;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #555;
      text-align: left;
      margin-bottom: 28px;
      width: 100%;
      box-sizing: border-box;
    }

    .notfound-reason p {
      margin: 4px 0;
    }

    .notfound-reason p::before {
      content: '• ';
      color: #F76900;
      font-weight: 700;
    }

    .btn-home {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #F76900, #e05e00);
      color: white;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(247,105,0,0.4);
      margin-right: 10px;
    }

    .btn-home:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .btn-back {
      display: inline-block;
      padding: 14px 24px;
      background: #f4f6fb;
      color: #000E54;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
      border: 2px solid #e0e4ef;
    }

    .btn-back:hover {
      background: #e8eaf0;
    }

    .notfound-footer {
      margin-top: 28px;
      font-size: 0.78rem;
      color: #aaa;
    }

    .notfound-footer span {
      color: #F76900;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .notfound-card {
        padding: 36px 24px;
      }
      .notfound-code {
        font-size: 4.5rem;
      }
      .btn-home, .btn-back {
        display: block;
        margin: 0 0 10px 0;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="notfound-card">
    <div class="notfound-logo">
      <img src="/logo.png" alt="TutorMatch">
      <span>
        <span style="color:#000E54;">Tutor</span><span style="color:#F76900;">Match</span>
      </span>
    </div>

    <div class="notfound-code">404</div>
    <span class="notfound-icon">🔍</span>
    <h1 class="notfound-title">Page Not Found</h1>
    <p class="notfound-message">
      The page you're looking for doesn't exist or has been removed.
    </p>

    <div class="notfound-reason">
      <p>The tutor profile may have been deleted</p>
      <p>The link might be outdated or incorrect</p>
      <p>You may need to log in first</p>
    </div>

    <div>
      <a href="/dashboard" class="btn-home">🔍 Find a Tutor</a>
      <a href="javascript:history.back()" class="btn-back">← Go Back</a>
    </div>

    <div class="notfound-footer">
      Syracuse University · <span>#OrangeNation</span> 🍊
    </div>
  </div>
</body>
</html>
